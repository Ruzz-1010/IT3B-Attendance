<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IT3B Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
            position: relative;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .logo i {
            font-size: 40px;
            color: #667eea;
        }

        .logo h1 {
            font-size: 28px;
            color: #333;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .admin-toggle-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f0f0f0;
            border: none;
            color: #667eea;
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.3s;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .admin-toggle-btn:hover {
            background: #667eea;
            color: white;
            transform: rotate(15deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group label i {
            margin-right: 8px;
            color: #667eea;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .info-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-item i {
            font-size: 24px;
            color: #667eea;
        }

        .info-item strong {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .camera-section {
            margin-bottom: 20px;
        }

        .camera-section label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .camera-container {
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        #video {
            width: 100%;
            height: auto;
            background: #000;
            border-radius: 15px;
        }

        .capture-btn, .retake-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
            border-radius: 10px;
        }

        .capture-btn:hover, .retake-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .photo-preview {
            margin-top: 10px;
            text-align: center;
        }

        .photo-preview img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-alert {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-alert.success {
            background: #d4edda;
            border-left-color: #28a745;
        }

        .info-footer {
            margin-top: 20px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #666;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            top: 50%;
            transform: translateY(-50%);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #333;
        }

        .modal h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .card {
                padding: 20px;
            }
            
            .modal-content {
                margin: 20px;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <button class="admin-toggle-btn" onclick="openAdminModal()">
                <i class="fas fa-user-shield"></i>
            </button>
            
            <div class="header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>IT3B Attendance</h1>
                </div>
                <p class="subtitle">Secure Location-Based Verification</p>
            </div>

            <div id="statusAlert" class="status-alert" style="display: none;">
                <i class="fas fa-info-circle"></i>
                <span id="alertMessage"></span>
            </div>

            <form id="attendanceForm">
                <div class="form-group">
                    <label for="studentId">
                        <i class="fas fa-id-card"></i>
                        STUDENT ID
                    </label>
                    <input type="text" id="studentId" required placeholder="Enter your student ID">
                </div>

                <div class="form-group">
                    <label for="studentName">
                        <i class="fas fa-user"></i>
                        FULL NAME
                    </label>
                    <input type="text" id="studentName" required placeholder="Enter your full name">
                </div>

                <div class="info-section">
                    <div class="info-item" id="locationStatus">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <strong>LOCATION</strong>
                            <span class="info-value">Checking...</span>
                        </div>
                    </div>
                    <div class="info-item" id="timeStatus">
                        <i class="fas fa-clock"></i>
                        <div>
                            <strong>TIME WINDOW</strong>
                            <span class="info-value">Checking...</span>
                        </div>
                    </div>
                    <div class="info-item" id="attendanceStatus">
                        <i class="fas fa-calendar-check"></i>
                        <div>
                            <strong>TODAY'S STATUS</strong>
                            <span class="info-value">Ready</span>
                        </div>
                    </div>
                </div>

                <div class="camera-section">
                    <label>
                        <i class="fas fa-camera"></i>
                        PHOTO VERIFICATION
                    </label>
                    <div class="camera-container">
                        <video id="video" autoplay playsinline></video>
                        <canvas id="canvas" style="display: none;"></canvas>
                        <button type="button" id="captureBtn" class="capture-btn">
                            <i class="fas fa-camera-retro"></i> Capture Photo
                        </button>
                    </div>
                    <div id="photoPreview" class="photo-preview" style="display: none;">
                        <img id="capturedPhoto" alt="Captured photo">
                        <button type="button" id="retakeBtn" class="retake-btn">
                            <i class="fas fa-redo-alt"></i> Retake
                        </button>
                    </div>
                    <input type="hidden" id="photoData">
                </div>

                <button type="submit" id="submitBtn" class="submit-btn" disabled>
                    <i class="fas fa-check-circle"></i> Submit Attendance
                </button>
            </form>

            <div class="info-footer">
                <i class="fas fa-shield-alt"></i>
                <p>Secured with GPS, Time & Photo Verification</p>
            </div>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAdminModal()">&times;</span>
            <h2><i class="fas fa-user-shield"></i> Admin Login</h2>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="adminUsername" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" required placeholder="Enter password">
                </div>
                <button type="submit" class="login-btn">Login to Dashboard</button>
            </form>
            <p style="text-align: center; margin-top: 15px; font-size: 12px; color: #999;">
                Default: admin / admin123
            </p>
        </div>
    </div>

    <script>
        // Global Variables
        let currentLocation = null;
        let isWithinLocation = false;
        let isWithinTime = false;
        let currentPhoto = null;
        let stream = null;

        // Modal Functions
        function openAdminModal() {
            document.getElementById('adminModal').style.display = 'block';
        }

        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('adminModal');
            if (event.target === modal) {
                closeAdminModal();
            }
        }

        // Alert Function
        function showAlert(message, type) {
            const alertDiv = document.getElementById('statusAlert');
            const alertMessage = document.getElementById('alertMessage');
            alertMessage.textContent = message;
            alertDiv.style.display = 'flex';
            alertDiv.className = 'status-alert';
            if (type === 'success') {
                alertDiv.classList.add('success');
            }
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }

        // Camera Functions
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                document.getElementById('video').srcObject = stream;
            } catch (err) {
                console.error('Camera error:', err);
                showAlert('Unable to access camera. Please grant permission.', 'error');
            }
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            currentPhoto = canvas.toDataURL('image/jpeg', 0.7);
            document.getElementById('capturedPhoto').src = currentPhoto;
            document.getElementById('photoData').value = currentPhoto;
            
            document.getElementById('video').style.display = 'none';
            document.getElementById('photoPreview').style.display = 'block';
            document.getElementById('captureBtn').style.display = 'none';
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            updateSubmitButton();
        }

        function retakePhoto() {
            document.getElementById('video').style.display = 'block';
            document.getElementById('photoPreview').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'block';
            currentPhoto = null;
            initCamera();
            updateSubmitButton();
        }

        // Location Functions
        function calculateDistance(lat1, lon1, lat2, lon2) {
            if (!lat2 || !lon2) return Infinity;
            const R = 6371e3;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        async function checkLocation() {
            if (!navigator.geolocation) {
                document.querySelector('#locationStatus .info-value').textContent = 'Geolocation not supported';
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                currentLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                
                try {
                    const response = await fetch('php/get_settings.php');
                    const result = await response.json();
                    
                    if (result.success && result.data.location && result.data.location.latitude) {
                        const distance = calculateDistance(currentLocation.lat, currentLocation.lng, 
                            parseFloat(result.data.location.latitude), parseFloat(result.data.location.longitude));
                        isWithinLocation = distance <= result.data.location.radius;
                        const statusSpan = document.querySelector('#locationStatus .info-value');
                        if (isWithinLocation) {
                            statusSpan.innerHTML = `<span style="color: #28a745;">✓ Within area (${distance.toFixed(0)}m)</span>`;
                        } else {
                            statusSpan.innerHTML = `<span style="color: #dc3545;">✗ Outside area (${distance.toFixed(0)}m)</span>`;
                        }
                    } else {
                        document.querySelector('#locationStatus .info-value').innerHTML = '<span style="color: #ff9800;">⚠ Location not configured</span>';
                    }
                } catch (error) {
                    console.error('Error checking location:', error);
                    document.querySelector('#locationStatus .info-value').innerHTML = '<span style="color: #dc3545;">⚠ Error connecting to server</span>';
                }
                updateSubmitButton();
            }, () => {
                document.querySelector('#locationStatus .info-value').textContent = 'Unable to get location';
            });
        }

        async function checkTimeStatus() {
            try {
                const response = await fetch('php/get_settings.php');
                const result = await response.json();
                
                if (result.success && result.data.time && result.data.time.timeInStart) {
                    const now = new Date();
                    const currentTime = now.toTimeString().slice(0, 5);
                    const { timeInStart, timeInEnd, timeOutStart, timeOutEnd } = result.data.time;
                    
                    if (currentTime >= timeInStart && currentTime <= timeInEnd) {
                        document.querySelector('#timeStatus .info-value').innerHTML = '<span style="color: #28a745;">✓ Time In Open</span>';
                        isWithinTime = true;
                    } else if (currentTime >= timeOutStart && currentTime <= timeOutEnd) {
                        document.querySelector('#timeStatus .info-value').innerHTML = '<span style="color: #28a745;">✓ Time Out Open</span>';
                        isWithinTime = true;
                    } else {
                        document.querySelector('#timeStatus .info-value').innerHTML = '<span style="color: #dc3545;">✗ Window Closed</span>';
                        isWithinTime = false;
                    }
                } else {
                    document.querySelector('#timeStatus .info-value').innerHTML = '<span style="color: #ff9800;">⚠ Time not configured</span>';
                    isWithinTime = false;
                }
                updateSubmitButton();
            } catch (error) {
                console.error('Error checking time:', error);
                document.querySelector('#timeStatus .info-value').innerHTML = '<span style="color: #dc3545;">⚠ Error checking time</span>';
            }
        }

        async function checkTodayAttendance() {
            const studentId = document.getElementById('studentId').value;
            if (!studentId) return;
            
            try {
                const response = await fetch(`php/check_attendance.php?studentId=${encodeURIComponent(studentId)}`);
                const result = await response.json();
                
                if (result.success && result.data) {
                    const statusSpan = document.querySelector('#attendanceStatus .info-value');
                    if (result.data.hasTimeIn && !result.data.hasTimeOut) {
                        statusSpan.innerHTML = '<span style="color: #ff9800;">⚠ Timed In - Waiting for Time Out</span>';
                    } else if (result.data.hasTimeIn && result.data.hasTimeOut) {
                        statusSpan.innerHTML = '<span style="color: #4caf50;">✓ Completed Today</span>';
                        document.getElementById('submitBtn').disabled = true;
                    } else {
                        statusSpan.innerHTML = '<span style="color: #2196f3;">✓ Ready to Time In</span>';
                    }
                }
            } catch (error) {
                console.error('Error checking attendance:', error);
            }
        }

        function updateSubmitButton() {
            const btn = document.getElementById('submitBtn');
            if (isWithinLocation && isWithinTime && currentPhoto) {
                btn.disabled = false;
                btn.style.opacity = '1';
            } else {
                btn.disabled = true;
                btn.style.opacity = '0.5';
            }
        }

        // Attendance Submission
        document.getElementById('attendanceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
            
            const formData = new FormData();
            formData.append('studentId', document.getElementById('studentId').value);
            formData.append('studentName', document.getElementById('studentName').value);
            formData.append('latitude', currentLocation.lat);
            formData.append('longitude', currentLocation.lng);
            formData.append('photo', currentPhoto);
            
            try {
                const response = await fetch('php/submit_attendance.php', { method: 'POST', body: formData });
                const result = await response.json();
                
                showAlert(result.message, result.success ? 'success' : 'error');
                
                if (result.success) {
                    document.getElementById('attendanceForm').reset();
                    currentPhoto = null;
                    document.getElementById('photoPreview').style.display = 'none';
                    document.getElementById('video').style.display = 'block';
                    document.getElementById('captureBtn').style.display = 'block';
                    initCamera();
                }
            } catch (error) {
                showAlert('Error submitting attendance', 'error');
            }
            
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Submit Attendance';
            btn.disabled = false;
        });

        // Admin Login - FIXED
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            const loginBtn = document.querySelector('#adminLoginForm .login-btn');
            const originalText = loginBtn.innerHTML;
            
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            loginBtn.disabled = true;
            
            try {
                const response = await fetch('php/admin_login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Store login status
                    localStorage.setItem('admin_logged_in', 'true');
                    localStorage.setItem('admin_username', username);
                    
                    // Show success message
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    // Close modal
                    closeAdminModal();
                    
                    // Redirect to admin dashboard
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 500);
                } else {
                    showAlert(result.message, 'error');
                    loginBtn.innerHTML = originalText;
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Error connecting to server', 'error');
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        });

        // Event Listeners
        document.getElementById('studentId').addEventListener('change', checkTodayAttendance);
        document.getElementById('captureBtn').addEventListener('click', capturePhoto);
        document.getElementById('retakeBtn').addEventListener('click', retakePhoto);

        // Initialize
        initCamera();
        checkLocation();
        checkTimeStatus();
        setInterval(checkLocation, 30000);
        setInterval(checkTimeStatus, 60000);
    </script>
</body>
</html>
